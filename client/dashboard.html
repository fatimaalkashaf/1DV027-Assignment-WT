<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Game Sales Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <nav class="navbar">
    <span class="navbar-title">Video Game Sales Dashboard</span>
    <button id="logout-button" class="logout-button">Log out</button>
  </nav>

  <main class="dashboard">

    <!-- Overview section -->
    <section class="section">
      <h2 class="section-title">Overview</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <p class="stat-label">Total Games</p>
          <p id="total-games" class="stat-value">...</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Total Publishers</p>
          <p id="total-publishers" class="stat-value">...</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Total Platforms</p>
          <p id="total-platforms" class="stat-value">...</p>
        </div>
      </div>
    </section>

    <!-- Charts section -->
    <section class="section">
      <h2 class="section-title">Sales by Genre</h2>
      <div class="chart-container">
        <canvas id="genre-sales-chart"></canvas>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Regional Sales Distribution</h2>
      <div class="chart-container">
        <canvas id="regional-sales-chart"></canvas>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Active Platforms per Year</h2>
      <div class="chart-container">
        <canvas id="releases-year-chart"></canvas>
      </div>
    </section>

    <!-- Games table section -->
    <section class="section">
      <h2 class="section-title">Games</h2>

      <!-- Filters -->
      <div class="filters">
        <input id="filter-genre" type="text" placeholder="Filter by genre..." class="filter-input" />
        <input id="filter-platform" type="text" placeholder="Filter by platform..." class="filter-input" />
        <button id="apply-filters" class="filter-button">Apply</button>
        <button id="clear-filters" class="filter-button filter-button--secondary">Clear</button>
      </div>

      <!-- Loading indicator -->
      <p id="loading-indicator" class="loading-indicator hidden">Loading...</p>

      <!-- Games table -->
      <div class="table-wrapper">
        <table class="games-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Platform</th>
              <th>Year</th>
              <th>Genre</th>
              <th>Publisher</th>
              <th>Global Sales</th>
            </tr>
          </thead>
          <tbody id="games-table-body"></tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div id="pagination-container" class="pagination"></div>
    </section>

  </main>

  <script src="js/utils/tokenManager.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/aggregations.js"></script>
  <script src="js/api/graphql.js"></script>
  <script src="js/components/charts.js"></script>
  <script src="js/components/pagination.js"></script>
  <script src="js/components/navbar.js"></script>
  <script src="js/components/tableRenderer.js"></script>
  <script src="js/dashboard.js"></script>
</body>

</html>
